<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoRipz — Superflat Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   CRYPTORIPZ — TAKASHI MURAKAMI SUPERFLAT EDITION
   Kawaii × Chaos × Memecoin
═══════════════════════════════════════════════════════════════════ */

:root {
  --pink:        #FF1F8E;
  --pink-light:  #FFB3D9;
  --pink-pale:   #FFE5F4;
  --yellow:      #FFE62E;
  --yellow-light:#FFF3A3;
  --yellow-pale: #FFFACC;
  --blue:        #00B4FF;
  --blue-light:  #B3E5FF;
  --purple:      #9B19F5;
  --purple-light:#DDB3FF;
  --green:       #4FD15A;
  --green-light: #B8F5BF;
  --orange:      #FF6B2B;
  --red:         #FF3131;
  --gold:        #E6A800;
  --gold-light:  #FFE566;
  --black:       #111111;
  --white:       #FFFFFF;
  --cream:       #FFFAED;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: var(--cream);
  background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><g transform='translate(40,40)'><ellipse cx='0' cy='-15' rx='6' ry='10' fill='%23FFB8D9' stroke='%23111' stroke-width='1.2'/><ellipse cx='0' cy='-15' rx='6' ry='10' fill='%23FFE566' stroke='%23111' stroke-width='1.2' transform='rotate(60)'/><ellipse cx='0' cy='-15' rx='6' ry='10' fill='%23FFB8D9' stroke='%23111' stroke-width='1.2' transform='rotate(120)'/><ellipse cx='0' cy='-15' rx='6' ry='10' fill='%23FFE566' stroke='%23111' stroke-width='1.2' transform='rotate(180)'/><ellipse cx='0' cy='-15' rx='6' ry='10' fill='%23FFB8D9' stroke='%23111' stroke-width='1.2' transform='rotate(240)'/><ellipse cx='0' cy='-15' rx='6' ry='10' fill='%23FFE566' stroke='%23111' stroke-width='1.2' transform='rotate(300)'/><circle r='8' fill='%23FFD700' stroke='%23111' stroke-width='1.2'/><circle cx='-2.5' cy='-1.5' r='1.3' fill='%23111'/><circle cx='2.5' cy='-1.5' r='1.3' fill='%23111'/><path d='M-4,2 Q0,5.5 4,2' stroke='%23111' stroke-width='1.3' fill='none' stroke-linecap='round'/></g></svg>");
  background-repeat: repeat;
  color: var(--black);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── RAINBOW TOP BAR ── */
.rainbow-bar {
  height: 7px;
  background: linear-gradient(90deg,
    var(--pink) 0%, var(--orange) 16%, var(--yellow) 32%,
    var(--green) 48%, var(--blue) 64%, var(--purple) 80%, var(--pink) 100%
  );
  border-bottom: 2px solid var(--black);
}

/* ── HEADER ── */
header {
  background: var(--white);
  border-bottom: 3px solid var(--black);
  text-align: center;
  padding: 1.75rem 1rem 1.5rem;
  position: relative;
  overflow: hidden;
}

.header-flowers-row {
  display: flex;
  justify-content: center;
  gap: 0.3rem;
  font-size: 1.4rem;
  margin-bottom: 0.5rem;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-5px); }
}

.logo {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(3.2rem, 10vw, 7rem);
  line-height: 1;
  letter-spacing: -0.01em;
  display: inline-block;
}

.logo-crypto {
  color: var(--pink);
  -webkit-text-stroke: 3px var(--black);
  paint-order: stroke fill;
}

.logo-ripz {
  color: var(--yellow);
  -webkit-text-stroke: 3px var(--black);
  paint-order: stroke fill;
}

.ticker-badge {
  display: inline-block;
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  background: var(--black);
  color: var(--yellow);
  padding: 3px 18px;
  border-radius: 100px;
  letter-spacing: 0.05em;
  margin-left: 0.5rem;
  vertical-align: middle;
  position: relative;
  top: -0.5rem;
}

.tagline {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--purple);
  margin-top: 0.6rem;
  border: 2.5px solid var(--purple);
  display: inline-block;
  padding: 4px 18px;
  border-radius: 100px;
  background: var(--purple-light);
}

/* ── STATS BAR ── */
.stats-bar {
  background: var(--yellow);
  border-bottom: 3px solid var(--black);
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.stat {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.6rem 1.4rem;
  border-right: 2px solid rgba(0,0,0,0.15);
  display: flex;
  gap: 0.4rem;
  align-items: center;
}
.stat:last-child { border-right: none; }
.stat-label { opacity: 0.65; }
.stat-val {
  color: var(--black);
  font-weight: 900;
  background: var(--white);
  padding: 1px 8px;
  border: 2px solid var(--black);
  border-radius: 100px;
  font-size: 0.68rem;
  min-width: 28px;
  text-align: center;
}

/* ── MAIN LAYOUT ── */
main {
  max-width: 1120px;
  margin: 0 auto;
  padding: 2rem 1rem;
}

/* ── PANEL (shared container style) ── */
.panel {
  background: var(--white);
  border: 3px solid var(--black);
  border-radius: 16px;
  overflow: hidden;
}

/* ── PACK SECTION ── */
.pack-section {
  background: var(--white);
  border: 3px solid var(--black);
  border-radius: 16px;
  padding: 2rem 1.5rem;
  text-align: center;
  margin-bottom: 2rem;
  position: relative;
  overflow: hidden;
}

/* decorative corners */
.pack-section::before,
.pack-section::after {
  content: '🌸';
  position: absolute;
  font-size: 3rem;
  opacity: 0.08;
  pointer-events: none;
}
.pack-section::before { top: -8px; left: -4px; transform: rotate(-20deg); }
.pack-section::after  { bottom: -8px; right: -4px; transform: rotate(20deg); }

.section-label {
  font-family: 'Fredoka One', cursive;
  font-size: 0.9rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--purple);
  margin-bottom: 1.5rem;
}

/* ── PACK VISUAL ── */
.pack-wrapper {
  display: inline-block;
  cursor: pointer;
  margin-bottom: 1.5rem;
  -webkit-tap-highlight-color: transparent;
}

.pack {
  width: 148px;
  height: 210px;
  background: linear-gradient(145deg, var(--pink) 0%, #C000D0 100%);
  border: 3px solid var(--black);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  position: relative;
  overflow: hidden;
  box-shadow: 5px 5px 0 var(--black);
  transition: transform 0.15s, box-shadow 0.15s;
}

.pack-wrapper:hover .pack {
  transform: translate(-3px, -3px);
  box-shadow: 8px 8px 0 var(--black);
}

.pack-wrapper:active .pack {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--black);
}

/* flower watermark on pack */
.pack-bg-flower {
  position: absolute;
  font-size: 5rem;
  opacity: 0.12;
  animation: spin-slow 12s linear infinite;
  top: 10px;
  right: -12px;
}

@keyframes spin-slow {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.pack-icon { font-size: 3.2rem; position: relative; z-index: 1; }

.pack-name {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  color: var(--white);
  -webkit-text-stroke: 1px var(--black);
  paint-order: stroke fill;
  letter-spacing: 0.03em;
  position: relative;
  z-index: 1;
}

.pack-sub {
  font-size: 0.58rem;
  color: rgba(255,255,255,0.8);
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}

.pack-stripe {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 7px;
  background: linear-gradient(90deg,
    var(--yellow), var(--orange), var(--red),
    var(--purple), var(--blue), var(--green), var(--yellow)
  );
}

/* ── PULL BUTTONS ── */
.pull-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 1.15rem;
  letter-spacing: 0.04em;
  padding: 0.8rem 3rem;
  background: var(--pink);
  color: var(--white);
  -webkit-text-stroke: 0.5px var(--black);
  paint-order: stroke fill;
  border: 3px solid var(--black);
  border-radius: 100px;
  cursor: pointer;
  box-shadow: 5px 5px 0 var(--black);
  transition: transform 0.15s, box-shadow 0.15s;
  display: inline-block;
}

.pull-btn:hover {
  transform: translate(-2px, -2px);
  box-shadow: 7px 7px 0 var(--black);
}

.pull-btn:active {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--black);
}

.pull-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: 5px 5px 0 var(--black) !important;
}

.count-btns {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  margin-top: 1rem;
  flex-wrap: wrap;
}

.count-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 0.9rem;
  padding: 0.4rem 1.3rem;
  background: var(--white);
  color: var(--black);
  border: 2.5px solid var(--black);
  border-radius: 100px;
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--black);
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
}

.count-btn:hover,
.count-btn.active {
  background: var(--yellow);
  transform: translate(-1px, -1px);
  box-shadow: 4px 4px 0 var(--black);
}

/* ── REVEAL AREA ── */
.reveal-area {
  min-height: 300px;
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  flex-wrap: wrap;
  align-items: center;
  padding: 1.5rem 0;
}

.empty-state {
  text-align: center;
  padding: 2.5rem 2rem;
  border: 3px dashed rgba(0,0,0,0.18);
  border-radius: 16px;
  background: rgba(255,255,255,0.6);
}

.empty-icon  { font-size: 2.5rem; margin-bottom: 0.5rem; }
.empty-text  {
  font-weight: 800;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.35);
}

/* ── CARD ── */
.card {
  width: 152px;
  border-radius: 12px;
  border: 3px solid var(--black);
  overflow: hidden;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  background: var(--white);
  /* start hidden for reveal animation */
  transform: rotateY(90deg) scale(0.85);
  opacity: 0;
  transition:
    transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1),
    opacity   0.38s ease,
    box-shadow 0.2s;
}

.card.revealed {
  transform: rotateY(0deg) scale(1);
  opacity: 1;
}

.card:hover {
  transform: rotateY(0deg) scale(1.07) translateY(-9px) rotate(-1.5deg);
  z-index: 20;
}

/* rarity borders & shadows — Superflat offset style, not glow */
.card.rarity-C         { border-color: #AAAAAA; box-shadow: 4px 4px 0 #AAAAAA; }
.card.rarity-R         { border-color: var(--blue);   box-shadow: 4px 4px 0 var(--blue);   }
.card.rarity-SR        { border-color: var(--pink);   box-shadow: 4px 4px 0 var(--pink);   }
.card.rarity-UR        { border-color: var(--gold);   box-shadow: 4px 4px 0 var(--gold);   }
.card.rarity-LEGENDARY { animation: rainbow-card 1.8s linear infinite; }

@keyframes rainbow-card {
  0%   { border-color: #FF1F8E; box-shadow: 5px 5px 0 #FF1F8E; }
  17%  { border-color: #FF6B2B; box-shadow: 5px 5px 0 #FF6B2B; }
  33%  { border-color: #FFE62E; box-shadow: 5px 5px 0 #FFE62E; }
  50%  { border-color: #4FD15A; box-shadow: 5px 5px 0 #4FD15A; }
  67%  { border-color: #00B4FF; box-shadow: 5px 5px 0 #00B4FF; }
  83%  { border-color: #9B19F5; box-shadow: 5px 5px 0 #9B19F5; }
  100% { border-color: #FF1F8E; box-shadow: 5px 5px 0 #FF1F8E; }
}

/* ── CARD ART TOP ── */
.card-art {
  height: 108px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.2rem;
  position: relative;
  border-bottom: 3px solid var(--black);
  overflow: hidden;
}

.rarity-C    .card-art { background: #EBEBEB; }
.rarity-R    .card-art { background: var(--blue-light); }
.rarity-SR   .card-art { background: var(--pink-light); }
.rarity-UR   .card-art { background: var(--yellow-light); }
.rarity-LEGENDARY .card-art { background: var(--black); }

/* UR shimmer */
.rarity-UR .card-art::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(45deg,
    transparent 30%, rgba(255,255,255,0.5) 50%, transparent 70%
  );
  animation: art-shimmer 2s ease-in-out infinite;
}

@keyframes art-shimmer {
  0%   { transform: translateX(-200%); }
  100% { transform: translateX(200%);  }
}

/* LEGENDARY rainbow overlay */
.rarity-LEGENDARY .card-art::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg,
    rgba(255,31,142,0.25), rgba(255,107,43,0.25), rgba(255,230,46,0.2),
    rgba(79,209,90,0.25),  rgba(0,180,255,0.25),  rgba(155,25,245,0.25)
  );
  animation: legend-hue 3s linear infinite;
}

@keyframes legend-hue {
  0%   { filter: hue-rotate(0deg);   }
  100% { filter: hue-rotate(360deg); }
}

/* flower corner decorations on card art */
.card-flower {
  position: absolute;
  font-size: 0.9rem;
  pointer-events: none;
  z-index: 2;
}
.card-flower.tl { top:  4px; left:  4px; }
.card-flower.tr { top:  4px; right: 4px; }

.card-emoji {
  position: relative;
  z-index: 1;
  line-height: 1;
}

/* rarity badge pinned bottom-left of art */
.card-rarity-badge {
  position: absolute;
  bottom: 6px; left: 6px;
  font-family: 'Fredoka One', cursive;
  font-size: 0.52rem;
  letter-spacing: 0.1em;
  padding: 1px 7px;
  border-radius: 100px;
  border: 2px solid var(--black);
  z-index: 3;
}

.rarity-C    .card-rarity-badge { background: #DCDCDC; color: #555; }
.rarity-R    .card-rarity-badge { background: var(--blue-light); color: #0060A0; }
.rarity-SR   .card-rarity-badge { background: var(--pink-light); color: var(--pink); }
.rarity-UR   .card-rarity-badge { background: var(--gold-light);  color: #7A5000; }
.rarity-LEGENDARY .card-rarity-badge { background: var(--black); color: var(--yellow); }

/* ── CARD BODY ── */
.card-body {
  padding: 9px 9px 8px;
  background: var(--white);
}

.card-name {
  font-family: 'Fredoka One', cursive;
  font-size: 0.78rem;
  color: var(--black);
  line-height: 1.2;
  margin-bottom: 1px;
}

.card-ticker {
  font-size: 0.62rem;
  font-weight: 900;
  color: var(--purple);
  margin-bottom: 7px;
}

.card-divider {
  height: 2.5px;
  background: var(--black);
  border-radius: 2px;
  opacity: 0.08;
  margin-bottom: 7px;
}

.card-stat {
  display: flex;
  justify-content: space-between;
  font-size: 0.56rem;
  margin-bottom: 3px;
  font-weight: 700;
}

.card-stat-label {
  text-transform: uppercase;
  letter-spacing: 0.04em;
  opacity: 0.45;
}

.card-stat-val { font-weight: 900; }

.positive { color: #1A9A1A; }
.negative { color: var(--red); }
.neutral  { color: var(--purple); }

.card-chain {
  font-size: 0.5rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  opacity: 0.3;
  margin-top: 5px;
  padding-top: 5px;
  border-top: 1px solid rgba(0,0,0,0.07);
}

/* ── TABS ── */
.tabs-wrapper {
  background: var(--white);
  border: 3px solid var(--black);
  border-radius: 16px;
  overflow: hidden;
  margin-top: 2rem;
}

.tabs {
  display: flex;
  border-bottom: 3px solid var(--black);
  background: var(--cream);
}

.tab-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 0.88rem;
  letter-spacing: 0.05em;
  padding: 0.75rem 1.5rem;
  cursor: pointer;
  color: rgba(0,0,0,0.45);
  border: none;
  background: transparent;
  border-right: 2px solid rgba(0,0,0,0.1);
  transition: background 0.15s, color 0.15s;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.tab-btn:last-child { border-right: none; }

.tab-btn:hover {
  background: rgba(255,230,46,0.25);
  color: var(--black);
}

.tab-btn.active {
  background: var(--yellow);
  color: var(--black);
  border-bottom: 3px solid var(--black);
  margin-bottom: -3px;
}

.tab-badge {
  background: var(--black);
  color: var(--yellow);
  font-size: 0.6rem;
  padding: 1px 8px;
  border-radius: 100px;
}

.tab-btn.active .tab-badge {
  background: var(--pink);
  color: var(--white);
}

.tab-panel {
  display: none;
  padding: 1.5rem;
}

.tab-panel.active { display: block; }

/* ── FILTER ROW ── */
.filter-row {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 0.78rem;
  padding: 4px 14px;
  border-radius: 100px;
  cursor: pointer;
  background: var(--white);
  border: 2.5px solid var(--black);
  color: var(--black);
  box-shadow: 2px 2px 0 var(--black);
  transition: all 0.15s;
}

.filter-btn:hover,
.filter-btn.active {
  background: var(--pink);
  color: var(--white);
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--black);
}

/* ── COLLECTION GRID ── */
.collection-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
  gap: 0.8rem;
}

.collection-grid .card {
  width: 100%;
  transform: none;
  opacity: 1;
}

.collection-grid .card:hover {
  transform: scale(1.06) translateY(-6px) rotate(-1.5deg);
}

/* ── NOTIFICATION TOAST ── */
.notif {
  position: fixed;
  top: 1rem;
  right: 1rem;
  background: var(--white);
  border: 3px solid var(--black);
  border-left: 6px solid var(--purple);
  border-radius: 12px;
  padding: 0.9rem 1.1rem;
  font-weight: 800;
  font-size: 0.8rem;
  z-index: 1000;
  max-width: 250px;
  line-height: 1.5;
  box-shadow: 5px 5px 0 var(--black);
  transform: translateX(140%);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: pre-line;
}

.notif.show  { transform: translateX(0); }
.notif.rare  { border-left-color: var(--gold); background: var(--yellow-pale); }

/* ── FLASH OVERLAY ── */
.flash {
  position: fixed;
  inset: 0;
  background: var(--pink);
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  animation: flash-anim 0.55s ease-out forwards;
}

@keyframes flash-anim {
  0%   { opacity: 0.22; }
  100% { opacity: 0; }
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .card        { width: 130px; }
  .stat        { padding: 0.5rem 0.75rem; font-size: 0.65rem; }
  .pack        { width: 130px; height: 190px; }
  .pull-btn    { padding: 0.7rem 2rem; font-size: 1rem; }
}
</style>
</head>
<body>

<div class="rainbow-bar"></div>

<header>
  <div class="header-flowers-row">
    🌸 🌼 🌺 🌸 🌼 🌺 🌸 🌼 🌺 🌸
  </div>
  <div class="logo">
    <span class="logo-crypto">Crypto</span><span class="logo-ripz">Ripz</span><span class="ticker-badge">$RIPZ</span>
  </div>
  <div class="tagline">🌸 Superflat Memecoin Trading Cards 🌸</div>
</header>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-label">pulls</span>
    <span class="stat-val" id="totalPulls">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">cards</span>
    <span class="stat-val" id="totalCards">0</span>
  </div>
  <div class="stat">

];

const RARITIES = [
  { rarity: "LEGENDARY", weight: 1  },
  { rarity: "UR",        weight: 4  },
  { rarity: "SR",        weight: 10 },
  { rarity: "R",         weight: 25 },
  { rarity: "C",         weight: 60 },
];

const RARITY_ORDER = ["C", "R", "SR", "UR", "LEGENDARY"];

// ─── STATE ──────────────────────────────────────────────────────────────────
const state = {
  totalPulls: 0,
  collection: [],
  pullCount:  5,
  collFilter: "ALL",
};

// ─── RARITY ROLL ────────────────────────────────────────────────────────────
function rollRarity() {
  const total = RARITIES.reduce((s, r) => s + r.weight, 0);
  let roll = Math.random() * total;
  for (const r of RARITIES) {
    roll -= r.weight;
    if (roll <= 0) return r.rarity;
  }
  return "C";
}

// ─── CARD RENDER ────────────────────────────────────────────────────────────
function makeCard(coin, rarity) {
  const div = document.createElement("div");
  div.className = `card rarity-${rarity}`;

  const isPos     = coin.change.startsWith("+");
  const isInf     = coin.change.includes("∞");
  const changeClass = isInf ? "neutral" : isPos ? "positive" : "negative";

  // LEGENDARY gets skull flowers, others get the regular Murakami flower
  const cornerFlower = rarity === "LEGENDARY" ? "💀" : "🌸";

  div.innerHTML = `
    <div class="card-art">
      <span class="card-flower tl">${cornerFlower}</span>
      <span class="card-flower tr">${cornerFlower}</span>
      <span class="card-emoji">${coin.icon}</span>
      <div class="card-rarity-badge">${rarity}</div>
    </div>
    <div class="card-body">
      <div class="card-name">${coin.name}</div>
      <div class="card-ticker">$${coin.ticker}</div>
      <div class="card-divider"></div>
      <div class="card-stat">
        <span class="card-stat-label">MCAP</span>
        <span class="card-stat-val neutral">${coin.mcap}</span>
      </div>
      <div class="card-stat">
        <span class="card-stat-label">VOL</span>
        <span class="card-stat-val neutral">${coin.vol}</span>
      </div>
      <div class="card-stat">
        <span class="card-stat-label">AGE</span>
        <span class="card-stat-val neutral">${coin.age}</span>
      </div>
      <div class="card-stat">
        <span class="card-stat-label">24H</span>
        <span class="card-stat-val ${changeClass}">${coin.change}</span>
      </div>
      <div class="card-chain">${coin.chain}</div>
    </div>
  `;
  return div;
}

// ─── OPEN PACK ──────────────────────────────────────────────────────────────
function openPack() {
  const btn = document.getElementById("pullBtn");
  if (btn.disabled) return;
  btn.disabled = true;

  // Flash overlay
  const flash = document.createElement("div");
  flash.className = "flash";
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 650);

  const n = state.pullCount;
  const pulls = [];

  for (let i = 0; i < n; i++) {
    const coin   = COINS[Math.floor(Math.random() * COINS.length)];
    const rarity = rollRarity();
    pulls.push({ coin, rarity });
    state.collection.push({ coin, rarity });
    state.totalPulls++;
  }

  // Render reveal area
  const area = document.getElementById("revealArea");
  area.innerHTML = "";
  pulls.forEach(({ coin, rarity }, i) => {
    const el = makeCard(coin, rarity);
    area.appendChild(el);
    setTimeout(() => el.classList.add("revealed"), 60 + i * 140);
  });

  // Notify on rare+ pulls
  const best = pulls.reduce(
    (b, p) => RARITY_ORDER.indexOf(p.rarity) > RARITY_ORDER.indexOf(b.rarity) ? p : b,
    pulls[0]
  );
  if (best.rarity === "LEGENDARY") {
    showNotif(`💀 LEGENDARY!\n${best.coin.name} ($${best.coin.ticker})`, true);
  } else if (best.rarity === "UR") {
    showNotif(`✨ ULTRA RARE!\n${best.coin.name} ($${best.coin.ticker})`, true);
  } else if (best.rarity === "SR") {
    showNotif(`🌸 Super Rare: ${best.coin.name}`, false);
  }

  updateStats();
  renderCollection();
  setTimeout(() => { btn.disabled = false; }, n * 140 + 500);
}

// ─── STATS ──────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById("totalPulls").textContent = state.totalPulls;
  document.getElementById("totalCards").textContent = state.collection.length;

  const unique = new Set(state.collection.map(c => c.coin.ticker)).size;
  document.getElementById("uniqueCards").textContent = unique;

  const rarest = state.collection.reduce(
    (b, p) => RARITY_ORDER.indexOf(p.rarity) > RARITY_ORDER.indexOf(b.rarity) ? p : b,
    state.collection[0]
  );
  document.getElementById("rarestPull").textContent =
    rarest ? `${rarest.rarity} · $${rarest.coin.ticker}` : "—";

  document.getElementById("collBadge").textContent  = state.collection.length;
  document.getElementById("codexBadge").textContent =
    `${unique}/${COINS.length}`;
}

// ─── COLLECTION ─────────────────────────────────────────────────────────────
function renderCollection() {
  const grid = document.getElementById("collectionGrid");
  grid.innerHTML = "";

  let items = [...state.collection].reverse();
  if (state.collFilter !== "ALL")
    items = items.filter(i => i.rarity === state.collFilter);

  if (!items.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🌺</div>
        <div class="empty-text">no cards match this filter</div>
      </div>`;
    return;
  }

  items.forEach(({ coin, rarity }) => grid.appendChild(makeCard(coin, rarity)));
  renderCodex();
}

// ─── CODEX ──────────────────────────────────────────────────────────────────
function renderCodex() {
  const grid = document.getElementById("codexGrid");
  grid.innerHTML = "";

  COINS.forEach(coin => {
    const found = state.collection.find(c => c.coin.ticker === coin.ticker);
    if (found) {
      grid.appendChild(makeCard(found.coin, found.rarity));
    } else {
      const div = document.createElement("div");
      div.className = "card rarity-C";
      div.style.cssText = "opacity:0.28;filter:grayscale(1);width:100%;transform:none;";
      div.innerHTML = `
        <div class="card-art" style="height:108px;background:#E8E8E8;">
          <span style="font-size:2.4rem;opacity:0.18">?</span>
        </div>
        <div class="card-body">
          <div class="card-name" style="color:#aaa">???</div>
          <div class="card-ticker" style="color:#bbb">UNDISCOVERED</div>
        </div>`;
      grid.appendChild(div);
    }
  });
}

// ─── UI HELPERS ─────────────────────────────────────────────────────────────
function setCount(n, el) {
  state.pullCount = n;
  document.querySelectorAll(".count-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
}

function switchTab(name, el) {
  document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  document.getElementById(`tab-${name}`).classList.add("active");
  if (name === "codex") renderCodex();
}

function filterColl(f, el) {
  state.collFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderCollection();
}

let notifTimer;
function showNotif(msg, rare = false) {
  const el = document.getElementById("notif");
  el.textContent = msg;
  el.className = "notif show" + (rare ? " rare" : "");
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove("show"), 3800);
}

// Init codex on load
renderCodex();
document.getElementById("codexBadge").textContent = `0/${COINS.length}`;
</script>
