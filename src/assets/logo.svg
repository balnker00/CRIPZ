<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <radialGradient id="coinGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="40%" stop-color="#FFB800"/>
      <stop offset="80%" stop-color="#CC8800"/>
      <stop offset="100%" stop-color="#996600"/>
    </radialGradient>
    <radialGradient id="coinRim" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#664400"/>
    </radialGradient>
    <radialGradient id="coinInner" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFD040"/>
      <stop offset="60%" stop-color="#E8A000"/>
      <stop offset="100%" stop-color="#B87000"/>
    </radialGradient>
    <radialGradient id="bagGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#003300"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bag body — slightly curved trapezoid -->
  <path d="M 30 52 Q 28 52 22 58 L 10 185 Q 9 196 22 198 L 178 198 Q 191 196 190 185 L 178 58 Q 172 52 170 52 Z"
        fill="url(#bagGlow)" stroke="#33FF66" stroke-width="4" stroke-linejoin="round"/>

  <!-- Outer green glow stroke (thicker outer) -->
  <path d="M 30 52 Q 28 52 22 58 L 10 185 Q 9 196 22 198 L 178 198 Q 191 196 190 185 L 178 58 Q 172 52 170 52 Z"
        fill="none" stroke="#00CC44" stroke-width="7" stroke-linejoin="round" opacity="0.5"/>

  <!-- Corner diagonal accent lines (white/cream) -->
  <line x1="22" y1="58" x2="52" y2="90" stroke="#FFFBE0" stroke-width="2.5" opacity="0.7"/>
  <line x1="178" y1="58" x2="148" y2="90" stroke="#FFFBE0" stroke-width="2.5" opacity="0.7"/>
  <line x1="10" y1="185" x2="42" y2="165" stroke="#FFFBE0" stroke-width="2.5" opacity="0.7"/>
  <line x1="190" y1="185" x2="158" y2="165" stroke="#FFFBE0" stroke-width="2.5" opacity="0.7"/>

  <!-- Seal strip top (dark) -->
  <rect x="10" y="28" width="180" height="26" rx="4" fill="#111111" stroke="#33FF66" stroke-width="3"/>

  <!-- Seal horizontal lines -->
  <line x1="22" y1="34" x2="178" y2="34" stroke="#AAFFCC" stroke-width="1.2" opacity="0.6"/>
  <line x1="22" y1="38" x2="178" y2="38" stroke="#AAFFCC" stroke-width="1.2" opacity="0.6"/>
  <line x1="22" y1="42" x2="178" y2="42" stroke="#AAFFCC" stroke-width="1.2" opacity="0.6"/>
  <line x1="22" y1="46" x2="178" y2="46" stroke="#AAFFCC" stroke-width="1.2" opacity="0.6"/>

  <!-- Seal clasp circle -->
  <circle cx="100" cy="40" r="8" fill="#222" stroke="#33FF66" stroke-width="2"/>
  <circle cx="100" cy="40" r="4" fill="#333" stroke="#55EE77" stroke-width="1"/>

  <!-- Seal top white zipper line -->
  <line x1="14" y1="29" x2="186" y2="29" stroke="#CCFFDD" stroke-width="3" opacity="0.9"/>

  <!-- Starburst / sparkle behind coin -->
  <g filter="url(#starGlow)" opacity="0.95">
    <!-- Main 4-point star -->
    <polygon points="100,65 103,90 100,115 97,90" fill="#FFFBE0" opacity="0.9"/>
    <polygon points="74,90 90,88 115,90 90,92" fill="#FFFBE0" opacity="0.9"/>
    <!-- Diagonal rays -->
    <polygon points="80,68 90,82 82,94 78,78" fill="#FFFBE0" opacity="0.55"/>
    <polygon points="120,68 110,82 118,94 122,78" fill="#FFFBE0" opacity="0.55"/>
    <!-- Small sparkle dots -->
    <circle cx="68" cy="72" r="2.5" fill="#FFE888" opacity="0.8"/>
    <circle cx="134" cy="75" r="1.8" fill="#FFE888" opacity="0.7"/>
    <circle cx="72" cy="115" r="1.5" fill="#FFE888" opacity="0.6"/>
    <circle cx="130" cy="112" r="2" fill="#FFE888" opacity="0.6"/>
    <circle cx="118" cy="68" r="1.2" fill="#FFFFFF" opacity="0.8"/>
  </g>

  <!-- Coin outer rim shadow -->
  <circle cx="100" cy="130" r="58" fill="#664400" filter="url(#coinShadow)"/>

  <!-- Coin body -->
  <circle cx="100" cy="128" r="56" fill="url(#coinGrad)"/>

  <!-- Coin edge bevel -->
  <circle cx="100" cy="128" r="56" fill="none" stroke="#CC8800" stroke-width="6"/>
  <circle cx="100" cy="128" r="53" fill="none" stroke="#FFE066" stroke-width="2" opacity="0.6"/>

  <!-- Coin inner circle -->
  <circle cx="100" cy="128" r="43" fill="url(#coinInner)"/>
  <circle cx="100" cy="128" r="43" fill="none" stroke="#AA6600" stroke-width="2"/>

  <!-- Dollar sign -->
  <text x="100" y="143" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#7A4800">$</text>
  <text x="100" y="141" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#FFD040">$</text>

  <!-- Coin highlight (top-left gloss) -->
  <ellipse cx="82" cy="110" rx="14" ry="9" fill="white" opacity="0.2" transform="rotate(-20, 82, 110)"/>
  <ellipse cx="78" cy="108" rx="7" ry="4" fill="white" opacity="0.25" transform="rotate(-20, 78, 108)"/>
</svg>
